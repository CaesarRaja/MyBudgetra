<body class="bg-background text-on-background min-h-screen flex items-center justify-center p-container-padding">
<main class="w-full max-w-md">
<!-- Header Section -->
<header class="text-center mb-stack-md">
<div class="inline-flex items-center justify-center w-16 h-16 rounded-xl bg-surface-container-high mb-stack-sm shadow-lg border border-white/10">
<span class="material-symbols-outlined text-4xl text-primary" data-weight="fill" style="font-variation-settings: 'FILL' 1;">
                    account_balance_wallet
                </span>
</div>
<h1 class="font-display-lg text-display-lg mb-base">MyBudgetra</h1>
<p class="font-body-md text-body-md text-text-muted">Welcome back! Please enter your details.</p>
</header>
<!-- Login Card -->
<div class="bg-surface-card rounded-xl p-stack-md shadow-[0_10px_25px_rgba(0,0,0,0.5)] border border-white/10">
<form class="space-y-stack-md">
<!-- Email Input -->
<div class="space-y-base">
<label class="font-label-md text-label-md block" for="email">Email</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-text-muted">mail</span>
</div>
<input class="block w-full pl-10 pr-3 py-3 bg-surface-container-low border border-outline-variant rounded-lg font-body-md text-body-md text-on-surface placeholder-text-muted focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-shadow" id="email" name="email" placeholder="Enter your email" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-base">
<label class="font-label-md text-label-md block" for="password">Password</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-text-muted">lock</span>
</div>
<input class="block w-full pl-10 pr-3 py-3 bg-surface-container-low border border-outline-variant rounded-lg font-body-md text-body-md text-on-surface placeholder-text-muted focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-shadow" id="password" name="password" placeholder="••••••••" type="password"/>
</div>
<div class="flex justify-end mt-base">
<a class="font-label-sm text-label-sm text-primary hover:text-primary-fixed-dim transition-colors" href="#">Forgot Password?</a>
</div>
</div>
<!-- Action Button -->
<button class="w-full flex justify-center items-center py-3 px-4 border border-transparent rounded-lg shadow-sm font-label-md text-label-md text-on-primary bg-primary hover:bg-primary-fixed-dim focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary focus:ring-offset-surface-card transition-colors" type="button">
                    Login
                </button>
</form>
<!-- Social Login Divider -->
<div class="mt-stack-md relative">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant"></div>
</div>
<div class="relative flex justify-center text-sm">
<span class="px-2 bg-surface-card font-label-sm text-label-sm text-text-muted">Or continue with</span>
</div>
</div>
<!-- Social Login Buttons -->
<div class="mt-stack-md grid grid-cols-2 gap-gutter-md">
<button class="flex justify-center items-center py-2 px-4 border border-outline-variant rounded-lg bg-surface-container hover:bg-surface-container-highest focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary focus:ring-offset-surface-card transition-colors" type="button">
<svg class="w-5 h-5 mr-2" fill="currentColor" viewbox="0 0 24 24">

</button>

                Don't have an account? <a class="text-primary hover:text-primary-fixed-dim font-label-md transition-colors" href="#">Sign Up</a>
</p>
