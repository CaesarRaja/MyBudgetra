<body class="min-h-screen flex items-center justify-center p-container-padding">
<!-- Signup Container -->
<main class="w-full max-w-md bg-surface-card rounded-xl border border-white/10 shadow-[0px_10px_25px_rgba(0,0,0,0.5)] p-stack-md flex flex-col gap-stack-md relative overflow-hidden">
<!-- Decorative Ambient Glow -->
<div class="absolute top-0 right-0 -mr-20 -mt-20 w-64 h-64 bg-primary/10 rounded-full blur-3xl pointer-events-none"></div>
<!-- Header -->
<header class="flex flex-col gap-stack-sm items-center text-center z-10">
<div class="w-12 h-12 bg-primary-container rounded-lg flex items-center justify-center mb-base shadow-[0px_4px_12px_rgba(16,185,129,0.3)]">
<span class="material-symbols-outlined text-on-primary-container" style="font-variation-settings: 'FILL' 1; font-size: 28px;">account_balance_wallet</span>
</div>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-primary">MyBudgetra</h1>
<p class="font-body-md text-body-md text-text-muted">Create an account to start managing your wealth.</p>
</header>
<!-- Form -->
<form class="flex flex-col gap-gutter-md z-10" onsubmit="event.preventDefault();">
<!-- Full Name -->
<div class="flex flex-col gap-base">
<label class="font-label-md text-label-md text-on-surface" for="fullName">Full Name</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-text-muted">person</span>
<input class="w-full bg-surface-container border border-transparent focus:border-primary rounded-lg py-3 pl-10 pr-4 font-body-md text-body-md text-on-surface placeholder:text-text-muted outline-none transition-colors" id="fullName" placeholder="John Doe" type="text"/>
</div>
</div>
<!-- Email -->
<div class="flex flex-col gap-base">
<label class="font-label-md text-label-md text-on-surface" for="email">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-text-muted">mail</span>
<input class="w-full bg-surface-container border border-transparent focus:border-primary rounded-lg py-3 pl-10 pr-4 font-body-md text-body-md text-on-surface placeholder:text-text-muted outline-none transition-colors" id="email" placeholder="john@example.com" type="email"/>
</div>
</div>
<!-- Password -->
<div class="flex flex-col gap-base">
<label class="font-label-md text-label-md text-on-surface" for="password">Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-text-muted">lock</span>
<input class="w-full bg-surface-container border border-transparent focus:border-primary rounded-lg py-3 pl-10 pr-4 font-body-md text-body-md text-on-surface placeholder:text-text-muted outline-none transition-colors" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-text-muted hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]">visibility_off</span>
</button>
</div>
</div>
<!-- Confirm Password -->
<div class="flex flex-col gap-base">
<label class="font-label-md text-label-md text-on-surface" for="confirmPassword">Confirm Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-text-muted">lock</span>
<input class="w-full bg-surface-container border border-transparent focus:border-primary rounded-lg py-3 pl-10 pr-4 font-body-md text-body-md text-on-surface placeholder:text-text-muted outline-none transition-colors" id="confirmPassword" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Terms Checkbox -->
<div class="flex items-start gap-3 mt-base">
<div class="flex items-center h-6">
<input class="w-4 h-4 rounded border-outline bg-surface-container text-primary focus:ring-primary focus:ring-offset-surface-card" id="terms" type="checkbox"/>
</div>
<div class="flex flex-col">
<label class="font-label-md text-label-md text-text-muted cursor-pointer" for="terms">
                        I agree to the <a class="text-primary hover:underline" href="#">Terms of Service</a> and <a class="text-primary hover:underline" href="#">Privacy Policy</a>.
                    </label>
</div>
</div>
<!-- Submit Button -->
<button class="w-full bg-primary-container hover:bg-primary-container/90 text-on-primary-container font-headline-md text-headline-md py-3 rounded-lg shadow-lg active:scale-[0.98] transition-all mt-stack-sm flex items-center justify-center gap-2" type="submit">
                Create Account
                <span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
</form>
<!-- Footer -->
<footer class="text-center mt-base z-10">
<p class="font-label-md text-label-md text-text-muted">
                Already have an account? <a class="text-primary hover:underline font-semibold" href="#">Login</a>
</p>
</footer>
</main>
